# SonarCloud scope adjustments for repository-owned generated assets and PostgreSQL migrations.
# SonarCloud does not provide a PostgreSQL-specific analyzer here; `.sql` files are handled by the
# PL/SQL analyzer unless file suffixes are remapped. Keep PostgreSQL procedure sources visible to
# analysis by mapping common Postgres suffixes into PL/SQL, then scope the known Oracle-specific
# false positives out of issue/coverage/duplication gates that are meant for application code.

sonar.projectKey=VannaDii_Revaer
sonar.organization=vannadii
sonar.sourceEncoding=UTF-8
sonar.tsql.file.suffixes=.tsql
sonar.plsql.file.suffixes=.sql,.pgsql,.plpgsql

sonar.sources=crates,.github/actions,.github/workflows,release,Dockerfile
sonar.tests=tests

sonar.exclusions=crates/revaer-ui/dist/**,crates/revaer-ui/dist-serve/**,crates/revaer-ui/static/nexus/**,crates/revaer-ui/ui_vendor/**,crates/revaer-ui/target/**,coverage/**,artifacts/**,release/package-lock.json
sonar.test.exclusions=tests/node_modules/**,tests/logs/**,tests/test-results/**,tests/.playwright/**,tests/.auth/**,tests/package-lock.json

# Rust coverage is already enforced authoritatively through `just cov` in CI. Keep Sonar
# focused on issue detection, duplication, and hotspot review instead of re-gating the
# long-lived Rust PR branch on a second coverage input with different semantics.
sonar.coverage.exclusions=crates/**/*.rs,.github/**,release/**,Dockerfile,crates/revaer-data/migrations/**/*.sql,crates/revaer-ui/dist/**,crates/revaer-ui/dist-serve/**,crates/revaer-ui/static/nexus/**,crates/revaer-ui/ui_vendor/**,tests/**/*.ts
sonar.cpd.exclusions=crates/**/tests/**/*.rs,crates/**/src/**/tests.rs,crates/**/src/**/tests/**/*.rs,crates/**/src/**/*_tests.rs,crates/revaer-data/migrations/**/*.sql,crates/revaer-ui/dist/**,crates/revaer-ui/dist-serve/**,crates/revaer-ui/static/nexus/**,crates/revaer-ui/ui_vendor/**,tests/specs/api/indexers-*.spec.ts,tests/support/api/schema.ts

sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10

sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=crates/revaer-data/migrations/**/*.sql

sonar.issue.ignore.multicriteria.e2.ruleKey=plsql:S1138
sonar.issue.ignore.multicriteria.e2.resourceKey=crates/revaer-data/migrations/**/*.sql

sonar.issue.ignore.multicriteria.e3.ruleKey=plsql:OrderByExplicitAscCheck
sonar.issue.ignore.multicriteria.e3.resourceKey=crates/revaer-data/migrations/**/*.sql

sonar.issue.ignore.multicriteria.e4.ruleKey=plsql:CrossJoinUsageCheck
sonar.issue.ignore.multicriteria.e4.resourceKey=crates/revaer-data/migrations/**/*.sql

sonar.issue.ignore.multicriteria.e5.ruleKey=plsql:S1066
sonar.issue.ignore.multicriteria.e5.resourceKey=crates/revaer-data/migrations/**/*.sql

sonar.issue.ignore.multicriteria.e6.ruleKey=plsql:NullComparison
sonar.issue.ignore.multicriteria.e6.resourceKey=crates/revaer-data/migrations/**/*.sql

sonar.issue.ignore.multicriteria.e7.ruleKey=plsql:DeleteOrUpdateWithoutWhereCheck
sonar.issue.ignore.multicriteria.e7.resourceKey=crates/revaer-data/migrations/**/*.sql

sonar.issue.ignore.multicriteria.e8.ruleKey=typescript:S101
sonar.issue.ignore.multicriteria.e8.resourceKey=tests/support/api/schema.ts

sonar.issue.ignore.multicriteria.e9.ruleKey=rust:S3776
sonar.issue.ignore.multicriteria.e9.resourceKey=crates/revaer-ui/src/features/**/view.rs

sonar.issue.ignore.multicriteria.e10.ruleKey=text:S8570
sonar.issue.ignore.multicriteria.e10.resourceKey=crates/**/Cargo.toml

sonar.rust.lcov.reportPaths=coverage/lcov.info
sonar.cfamily.compile-commands=coverage/compile_commands.json
sonar.newCode.referenceBranch=main
